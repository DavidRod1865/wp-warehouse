<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>With Pride · HVAC Ops</title>

    <script>
      ;(() => {
        try {
          const stored = localStorage.getItem('wp-theme')
          const theme =
            stored === 'withpride' || stored === 'withpride-dark'
              ? stored
              : window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'withpride-dark'
                : 'withpride'
          document.documentElement.setAttribute('data-theme', theme)
        } catch {
          // ignore
        }
      })()
    </script>

    <!-- IBM Plex — engineered feel for HVAC ops -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet">

    <link href="/src/index.css" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
